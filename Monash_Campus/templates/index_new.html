<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Bike Telemetry</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080d14;
      --surface: #0d1520;
      --surface2: #111c2e;
      --border: rgba(0,200,255,0.10);
      --border2: rgba(0,200,255,0.22);
      --cyan: #00c8ff;
      --cyan-dim: rgba(0,200,255,0.15);
      --cyan-glow: rgba(0,200,255,0.35);
      --amber: #ffb800;
      --amber-dim: rgba(255,184,0,0.12);
      --green: #00e87a;
      --green-dim: rgba(0,232,122,0.12);
      --red: #ff3d5a;
      --text: #e8f4ff;
      --muted: #5a7a9a;
      --soft: #8aaac0;
      --mono: 'Share Tech Mono', monospace;
      --head: 'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--head);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── TOP STATUS BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--cyan);
      text-transform: uppercase;
    }

    .divider-v {
      width: 1px;
      height: 16px;
      background: var(--border2);
    }

    .ts {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }

    .dot.active {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.6s ease-in-out infinite;
    }

    .dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── MAIN LAYOUT ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }

    /* ── LEFT: SPEEDOMETER ── */
    .speedo-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px 10px 14px;
      border-right: 1px solid var(--border);
      gap: 6px;
    }

    .speedo-wrap {
      position: relative;
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1;
    }

    .speedo-svg {
      width: 100%;
      height: 100%;
    }

    .speedo-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .speed-num {
      font-family: var(--head);
      font-size: clamp(42px, 11vw, 80px);
      font-weight: 700;
      line-height: 0.9;
      color: var(--text);
      letter-spacing: -0.02em;
      text-shadow: 0 0 30px var(--cyan-glow);
    }

    .speed-unit {
      font-size: clamp(11px, 2.5vw, 16px);
      color: var(--cyan);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .speed-max-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── RIGHT: STATS ── */
    .stats-panel {
      display: grid;
      grid-template-rows: 1fr 1fr;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      padding: 0;
    }

    .stat-cell {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
      transition: background 0.2s;
    }

    .stat-cell::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      transition: background 0.3s;
    }

    .stat-cell.accent-cyan::after { background: var(--cyan); }
    .stat-cell.accent-amber::after { background: var(--amber); }
    .stat-cell.accent-green::after { background: var(--green); }
    .stat-cell.accent-muted::after { background: var(--muted); }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: clamp(18px, 4vw, 32px);
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      display: flex;
      align-items: stretch;
      gap: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      height: 48px;
    }

    .url-section {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .url-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .url-input {
      flex: 1;
      background: rgba(0,200,255,0.05);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      min-width: 0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .url-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(0,200,255,0.15);
    }

    .url-input::placeholder { color: var(--muted); }

    .btn-group {
      display: flex;
      align-items: stretch;
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: var(--head);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 16px;
      border-left: 1px solid var(--border);
      background: transparent;
      color: var(--soft);
      transition: background 0.15s, color 0.15s;
    }

    .btn:active { opacity: 0.7; }

    .btn-save:hover { background: var(--cyan-dim); color: var(--cyan); }

    .btn-start {
      color: var(--green);
      border-left: 1px solid var(--border);
    }
    .btn-start:hover { background: var(--green-dim); }

    .btn-stop {
      color: var(--red);
      border-left: 1px solid var(--border);
    }
    .btn-stop:hover { background: rgba(255,61,90,0.1); }

    /* ── ACCURACY BAR ── */
    .acc-bar-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      max-width: 280px;
    }

    .acc-bar-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 48px;
    }

    .acc-bar-track {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      overflow: hidden;
    }

    .acc-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: var(--green);
      transition: width 0.5s ease, background 0.3s;
    }

    .acc-val {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      width: 36px;
      text-align: right;
    }

    /* ── PACKET COUNT ── */
    .pkt-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .pkt-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--cyan);
    }

    /* Tick marks on speedo */
    .tick-label {
      font-family: var(--head);
      font-size: 9px;
      fill: var(--muted);
    }

    /* portrait fallback */
    @media (orientation: portrait) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .speedo-panel {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 8px;
      }
      .speedo-wrap { max-width: 220px; }
      .stats-panel { grid-template-rows: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">⬡ Velox</span>
      <div class="divider-v"></div>
      <span class="ts" id="timestamp">--:--:--</span>
    </div>
    <div class="status-pill">
      <div class="dot" id="trackDot"></div>
      <span id="trackLabel">Idle</span>
    </div>
    <div class="status-pill">
      <div class="dot" id="sendDot"></div>
      <span id="sendLabel">No data</span>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: SPEEDOMETER -->
    <div class="speedo-panel">
      <div class="speedo-wrap">
        <svg class="speedo-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" id="speedoSvg">
          <defs>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Background ring -->
          <circle cx="130" cy="130" r="110" fill="none" stroke="rgba(0,200,255,0.06)" stroke-width="20"/>

          <!-- Track arc (220 degrees, from -110deg to +110deg, bottom gap) -->
          <path id="arcTrack" d="" fill="none" stroke="rgba(0,200,255,0.08)" stroke-width="16" stroke-linecap="round"/>

          <!-- Filled arc -->
          <path id="arcFill" d="" fill="none" stroke="#00c8ff" stroke-width="16" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>

          <!-- Danger zone arc (last 25% = 45-60 kph) -->
          <path id="arcDanger" d="" fill="none" stroke="rgba(255,61,90,0.35)" stroke-width="16" stroke-linecap="round"/>

          <!-- Tick marks + labels rendered by JS -->
          <g id="ticks"></g>

          <!-- Needle -->
          <line id="needle" x1="130" y1="130" x2="130" y2="38" stroke="rgba(255,184,0,0.9)" stroke-width="2" stroke-linecap="round" filter="url(#glow)" transform="rotate(0 130 130)"/>
          <circle cx="130" cy="130" r="7" fill="#0d1520" stroke="rgba(0,200,255,0.4)" stroke-width="1.5"/>
          <circle cx="130" cy="130" r="3" fill="var(--amber)"/>
        </svg>

        <div class="speedo-center">
          <div class="speed-num" id="speedNum">0</div>
          <div class="speed-unit">km/h</div>
        </div>
      </div>

      <!-- Accuracy bar -->
      <div class="acc-bar-wrap">
        <span class="acc-bar-label">Acc</span>
        <div class="acc-bar-track">
          <div class="acc-bar-fill" id="accFill"></div>
        </div>
        <span class="acc-val" id="accVal">— m</span>
      </div>

      <!-- Packet count -->
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="pkt-label">Packets</span>
        <span class="pkt-val" id="pktVal">0</span>
      </div>
    </div>

    <!-- RIGHT: STATS GRID -->
    <div class="stats-panel">

      <div class="stat-cell accent-cyan">
        <div class="stat-label">Latitude</div>
        <div class="stat-value" id="statLat">—</div>
        <div class="stat-sub">degrees N/S</div>
      </div>

      <div class="stat-cell accent-cyan">
        <div class="stat-label">Longitude</div>
        <div class="stat-value" id="statLon">—</div>
        <div class="stat-sub">degrees E/W</div>
      </div>

      <div class="stat-cell accent-amber">
        <div class="stat-label">Course</div>
        <div class="stat-value" id="statCourse">—</div>
        <div class="stat-sub" id="statCourseDir">heading</div>
      </div>

      <div class="stat-cell accent-green">
        <div class="stat-label">Speed m/s</div>
        <div class="stat-value" id="statMps">—</div>
        <div class="stat-sub">metres per second</div>
      </div>

    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <div class="url-section">
      <span class="url-label">Server</span>
      <input id="serverUrl" class="url-input" type="text" placeholder="https://your-ngrok-url.ngrok-free.app/update" />
    </div>
    <div class="btn-group">
      <button class="btn btn-save" id="saveBtn">Save</button>
      <button class="btn btn-start" id="startBtn">▶ Start</button>
      <button class="btn btn-stop" id="stopBtn">■ Stop</button>
    </div>
  </div>

<script>
const MAX_KPH = 60;
const ARC_START_DEG = 130;
const ARC_SWEEP = 280;
const CX = 130, CY = 130, R = 102;

function degToRad(d) { return d * Math.PI / 180; }

function polarPoint(cx, cy, r, angleDeg) {
  const a = degToRad(angleDeg - 90);
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}

function describeArc(cx, cy, r, startDeg, endDeg) {
  if (Math.abs(endDeg - startDeg) >= 360) endDeg = startDeg + 359.99;
  const [sx, sy] = polarPoint(cx, cy, r, startDeg);
  const [ex, ey] = polarPoint(cx, cy, r, endDeg);
  const sweep = endDeg - startDeg;
  const large = sweep > 180 ? 1 : 0;
  return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
}

const arcTrack = document.getElementById('arcTrack');
const arcFill = document.getElementById('arcFill');
const arcDanger = document.getElementById('arcDanger');
const needle = document.getElementById('needle');
const ticksG = document.getElementById('ticks');

const ARC_END_DEG = ARC_START_DEG + ARC_SWEEP;
arcTrack.setAttribute('d', describeArc(CX, CY, R, ARC_START_DEG, ARC_END_DEG));

const dangerStart = ARC_START_DEG + ARC_SWEEP * 0.75;
arcDanger.setAttribute('d', describeArc(CX, CY, R, dangerStart, ARC_END_DEG));

function buildTicks() {
  ticksG.innerHTML = '';
  const tickKphs = [0, 10, 20, 30, 40, 50, 60];
  tickKphs.forEach(kph => {
    const frac = kph / MAX_KPH;
    const angleDeg = ARC_START_DEG + ARC_SWEEP * frac;
    const [ox, oy] = polarPoint(CX, CY, R + 12, angleDeg);
    const [ix, iy] = polarPoint(CX, CY, R + 20, angleDeg);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', ox); line.setAttribute('y1', oy);
    line.setAttribute('x2', ix); line.setAttribute('y2', iy);
    line.setAttribute('stroke', kph >= 45 ? 'rgba(255,61,90,0.5)' : 'rgba(0,200,255,0.3)');
    line.setAttribute('stroke-width', '1.5');
    ticksG.appendChild(line);

    const [lx, ly] = polarPoint(CX, CY, R + 30, angleDeg);
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x', lx); text.setAttribute('y', ly);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('dominant-baseline','middle');
    text.setAttribute('font-family','Rajdhani,sans-serif');
    text.setAttribute('font-size','9');
    text.setAttribute('fill', kph >= 45 ? 'rgba(255,61,90,0.7)' : 'rgba(90,122,154,0.9)');
    text.textContent = kph;
    ticksG.appendChild(text);
  });

  for (let kph = 5; kph < MAX_KPH; kph += 10) {
    const frac = kph / MAX_KPH;
    const angleDeg = ARC_START_DEG + ARC_SWEEP * frac;
    const [ox2, oy2] = polarPoint(CX, CY, R + 12, angleDeg);
    const [ix2, iy2] = polarPoint(CX, CY, R + 17, angleDeg);
    const line2 = document.createElementNS('http://www.w3.org/2000/svg','line');
    line2.setAttribute('x1', ox2); line2.setAttribute('y1', oy2);
    line2.setAttribute('x2', ix2); line2.setAttribute('y2', iy2);
    line2.setAttribute('stroke', 'rgba(0,200,255,0.18)');
    line2.setAttribute('stroke-width', '1');
    ticksG.appendChild(line2);
  }
}
buildTicks();

let currentKph = 0;
let targetKph = 0;
let animFrame;

function setSpeedoTarget(kph) {
  targetKph = Math.min(Math.max(kph, 0), MAX_KPH);
}

function animateSpeedo() {
  currentKph += (targetKph - currentKph) * 0.18;
  if (Math.abs(currentKph - targetKph) < 0.05) currentKph = targetKph;

  const frac = currentKph / MAX_KPH;
  const fillEndDeg = ARC_START_DEG + ARC_SWEEP * frac;

  if (frac > 0.001) {
    arcFill.setAttribute('d', describeArc(CX, CY, R, ARC_START_DEG, fillEndDeg));
    const isHot = currentKph >= 45;
    arcFill.setAttribute('stroke', isHot ? '#ff3d5a' : '#00c8ff');
  } else {
    arcFill.setAttribute('d', '');
  }

  const needleAngle = -140 + ARC_SWEEP * frac;
  needle.setAttribute('transform', `rotate(${needleAngle} ${CX} ${CY})`);

  document.getElementById('speedNum').textContent = Math.round(currentKph);

  animFrame = requestAnimationFrame(animateSpeedo);
}
animateSpeedo();

function compassDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

function updateAccBar(accuracy) {
  const fill = document.getElementById('accFill');
  const val = document.getElementById('accVal');
  if (accuracy === null) { fill.style.width = '0%'; val.textContent = '— m'; return; }
  const pct = Math.max(0, Math.min(100, 100 - (accuracy / 100) * 100));
  fill.style.width = pct + '%';
  fill.style.background = accuracy <= 10 ? '#00e87a' : accuracy <= 30 ? '#ffb800' : accuracy <= 64 ? '#00c8ff' : '#ff3d5a';
  val.textContent = accuracy.toFixed(0) + 'm';
}

function setTrackStatus(text, state) {
  const dot = document.getElementById('trackDot');
  const label = document.getElementById('trackLabel');
  label.textContent = text;
  dot.className = 'dot' + (state === 'ok' ? ' active' : state === 'err' ? ' error' : '');
}

function setSendStatus(text, ok) {
  const dot = document.getElementById('sendDot');
  const label = document.getElementById('sendLabel');
  label.textContent = text;
  dot.className = 'dot' + (ok ? ' active' : ok === false ? ' error' : '');
}

let watchId = null;
let packetCount = 0;

const stored = localStorage.getItem('velox_server_url');
if (stored) document.getElementById('serverUrl').value = stored;

document.getElementById('saveBtn').addEventListener('click', () => {
  localStorage.setItem('velox_server_url', document.getElementById('serverUrl').value.trim());
  setSendStatus('URL saved', null);
});

document.getElementById('startBtn').addEventListener('click', startTracking);
document.getElementById('stopBtn').addEventListener('click', stopTracking);

function stopTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  setSpeedoTarget(0);
  setTrackStatus('Stopped', null);
}

function startTracking() {
  const url = document.getElementById('serverUrl').value.trim();
  if (!url) { setSendStatus('Enter server URL', false); return; }
  if (!navigator.geolocation) { setTrackStatus('No geolocation', 'err'); return; }

  setTrackStatus('Acquiring…', null);
  if (watchId !== null) navigator.geolocation.clearWatch(watchId);

  watchId = navigator.geolocation.watchPosition(async pos => {
    const c = pos.coords;
    const lat = c.latitude;
    const lon = c.longitude;
    const mps = (c.speed != null && c.speed >= 0) ? c.speed : 0;
    const kmh = mps * 3.6;
    const course = (c.heading != null && c.heading >= 0) ? c.heading : 0;
    const acc = c.accuracy ?? null;
    const ts = new Date(pos.timestamp).toISOString();

    setSpeedoTarget(kmh);
    document.getElementById('statLat').textContent = lat.toFixed(5);
    document.getElementById('statLon').textContent = lon.toFixed(5);
    document.getElementById('statCourse').textContent = course.toFixed(1) + '°';
    document.getElementById('statCourseDir').textContent = compassDir(course);
    document.getElementById('statMps').textContent = mps.toFixed(2);
    document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();
    updateAccBar(acc);
    setTrackStatus('Tracking', 'ok');

    const payload = { lat, lon, speed_mps: mps, speed_kmh: kmh, course_deg: course, accuracy_m: acc, timestamp: ts };

    try {
      const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      if (!r.ok) { setSendStatus('HTTP ' + r.status, false); return; }
      packetCount++;
      document.getElementById('pktVal').textContent = packetCount;
      setSendStatus('Sent ' + new Date().toLocaleTimeString(), true);
    } catch(e) {
      setSendStatus('Net error', false);
    }
  }, err => {
    const msgs = {1:'Permission denied', 2:'Position unavailable', 3:'Timeout'};
    setTrackStatus(msgs[err.code] || 'Error', 'err');
  }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
}
</script>
</body>
</html>
